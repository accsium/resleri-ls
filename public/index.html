<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蕾斯莱莉 角色图鉴</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1 id="pageTitle">蕾斯莱莉 角色图鉴</h1>
    <div class="header-right">
      <div class="lang-switcher">
        <button id="btn-ja" class="lang-btn">日</button>
        <button id="btn-cn" class="lang-btn active">中</button>
        <button id="btn-refresh" class="btn-refresh">强制刷新</button>
      </div>
      <div id="updateTime" class="update-time">更新时间</div>
    </div>
  </div>

  <!-- 导航栏 + 搜索框 -->
  <div class="nav-bar">
    <nav class="nav-links">
      <a id="nav-guide" class="nav-link active">角色图鉴</a>
      <a id="nav-collection" class="nav-link">角色收藏</a>
    </nav>
    <div class="nav-search">
      <input type="text" id="searchInput" placeholder="搜索角色名称..." oninput="handleSearch()">
    </div>
  </div>

  <!-- 排序、筛选控件（仅在图鉴视图显示） -->
  <div id="guideControls" class="controls-bar">
    <div class="sort-control">
      <label for="sortSelect">排序：</label>
      <select id="sortSelect"></select>
      <button id="orderToggle" class="order-btn">↓</button>
    </div>
    <button id="filterToggle" class="filter-btn">筛选</button>
  </div>

  <div class="filter-panel" id="filterPanel" style="display:none;">
    <div class="filter-group">
      <span>属性：</span>
      <div id="attrFilters"></div>
    </div>
    <div class="filter-group">
      <span>职业：</span>
      <div id="roleFilters"></div>
    </div>
    <button id="applyFilterBtn">应用筛选</button>
    <button id="clearFilterBtn">清除</button>
  </div>

  <!-- 角色图鉴容器 -->
  <div id="guideContainer" class="card-container"></div>

  <!-- 角色收藏容器（初始隐藏） -->
  <div id="collectionContainer" class="collection-container" style="display:none;">
    <div class="collection-placeholder" id="collectionPlaceholder">收藏功能即将上线</div>
  </div>

  <script src="utils.js"></script>
  <script src="components.js"></script>
  <script src="avatar.js"></script>
  <script src="chara_dex.js"></script>
  <script src="app.js"></script>
</body>
</html>
