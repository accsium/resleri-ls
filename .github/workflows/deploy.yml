name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 添加必要的权限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行拆分脚本
        run: node scripts/resolveAndSplit.js

      - name: 复制翻译文件到 public
        run: |
          mkdir -p public/data/jp public/data/cn
          cp -r data/jp/* public/data/jp/
          cp -r data/cn/* public/data/cn/

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
